<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Smartcash</title>
</head>
<body>
    <header>
        <h1>SmartCash</h1>
        <nav>
            <button onclick="abrirFecharCardsFlut('cardFlutAddTransacao')">Adicionar transação</button>
            <button onclick="abrirFecharCardsFlut('cardFlutCategorias')">Categorias</button> <!-- dentro terá adc limite -->
            <button>Dashboard detalhado</button>
        </nav>
    </header>

    <section class="periodo">
        <h3>Período levado em consideração</h3>
        <input type="date">
        <p>até</p>
        <input type="date">
    </section>

    <main>
        <section class="cards">
            <div class="card entrada"></div>
            <div class="card saida"></div>
            <div class="card resultado"></div>
        </section>

        <!-- Card flutuante add op -->
        <section id="cardFlutAddTransacao" class="oculto">
            <h3>Adicionar Transação</h3>

            <div class="infosTransacao">
                <label for="dataTransacao">Data da transação</label>
                <br>
                <input class="dataTransacao" type="date">
            </div>
            <div class="infosTransacao">
                <label for="tipoDeOperacao">Tipo da operação</label>
                <br>
                <select name="tipoDeOperacao" id="tipoDeOperacao" style="cursor: pointer;">
                    <option value="" disabled selected>Selecione</option>
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <div class="infosTransacao">
                <label for="valorDaTransacao">Valor da transação</label>
                <br>
                <label for="valorDaTransacao">R$</label>
                <input type="number" id="valorDaTransacao" placeholder="00,00">
            </div>
            <div class="infosTransacao">
                <label for="categoria">Categoria</label>
                <br>
                <input
                    type="text"
                    id="categoria"
                    list="categorias"
                    placeholder="Selecione ou digite uma categoria">
                <datalist id="categorias">
                    <option value="Alimentação">
                </datalist>
            </div>
            <div class="addTransacoesBotoes">
                <button id="btnSalvarTransacao">
                    Salvar transação
                </button>
                <button id="btnSairTransacao" onclick="abrirFecharCardsFlut('cardFlutAddTransacao')">
                    Sair
                </button>
            </div>
        </section>
        <!-- Fim card flutuante add op -->

        <!-- Card flutuante categorias -->

        <section id="cardFlutCategorias" class="oculto">
            <h3>Adicionar categoria</h3>

            <div class="addCategoria">
                <label for="nomeCategoria">Digite o nome da categoria</label>
                <br>
                <input class="nomeCategoria" type="text">
                <br>
                <label for="limiteCategoria">Se houver, digite a meta de valor limite da categoria</label>
                <br>
                <input class="limiteCategoria" type="number">
                <br>
                <button>Salvar</button>
            </div>

            <div id="categorias">

            </div>
             <button id="btnSairCategorias" onclick="abrirFecharCardsFlut('cardFlutCategorias')">
                    Sair
                </button>
        </section>

        <section class="transacoes">
            <table>
                <tr>
                    <th>

                    </th>
                    <th>

                    </th>
                    <th>

                    </th>
                    <th>
                        
                    </th>
                </tr>
            </table>
        </section>
    </main>

    <footer>

    </footer>

    <script src="js/script.js"></script>
</body>
</html>
