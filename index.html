<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Smartcash</title>
</head>
<body>
    <header>
        <h1>SmartCash</h1>
        <nav>
            <button onclick="abrirFecharCardsFlut('cardFlutAddTransacao')">Adicionar transação</button>
            <button onclick="abrirFecharCardsFlut('cardFlutCategorias')">Categorias</button> <!-- dentro terá adc limite -->
            <button>Dashboard detalhado</button>
        </nav>
    </header>

    <section class="periodo">
        <h3>Período levado em consideração</h3>
        <input type="date">
        <p>até</p>
        <input type="date">
    </section>

    <main>
        <section class="cards">
            <div class="card">
                <p id="valorTotalEntradaTransacoes">R$ 0,00</p>
            </div>
            <div class="card saida">
                <p id="valorTotalSaidaTransacoes">R$ 0,00</p>
            </div>
            <div class="card resultado">
                <p id="valorTotalResultadoTransacoes">R$ 0,00</p>
            </div>
        </section>

        <!-- Card flutuante add op -->
        <section id="cardFlutAddTransacao" class="oculto">
            <h3>Adicionar Transação</h3>

            <div class="infosTransacao">
                <label for="dataTransacao">Data da transação</label>
                <br>
                <input id="dataTransacao" type="date">
            </div>

            <div class="infosTransacao">
                <label for="tipoOperacaoTransacao">Tipo da operação</label>
                <br>
                <select name="tipoOperacaoTransacao" id="tipoOperacaoTransacao" style="cursor: pointer;">
                    <option value="" disabled selected>Selecione</option>
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>

            <div class="infosTransacao">
                <label for="valorTransacao">Valor da transação</label>
                <br>
                <label for="valorTransacao">R$</label>
                <input type="number" id="valorTransacao" placeholder="00,00">
            </div>

            <div class="infosTransacao">
                <label for="categoriaTransacao">Categoria</label>
                <br>
                <input
                    type="text"
                    id="categoriaTransacao"
                    list="categorias"
                    placeholder="Selecione ou digite uma categoria">
                <datalist id="categorias">
                    <option value="Alimentação">
                </datalist>
                <br>
                <label for="descTransacao">Descrição</label>
                <br>
                <input id="descTransacao" type="text">
            </div>

            <div class="addTransacoesBotoes">
                <button id="btnSalvarTransacao" onclick="btnAddOperacao(); attValorTotalTransacoes()">
                    Salvar transação
                </button>
                <button id="btnSairTransacao" onclick="abrirFecharCardsFlut('cardFlutAddTransacao')">
                    Sair
                </button>
            </div>
        </section>
        <!-- Fim card flutuante add op -->

        <!-- Card flutuante categorias -->
        <section id="cardFlutCategorias" class="oculto">
            <h3>Adicionar categoria</h3>

            <div class="addCategoria">
                <label for="nomeCategoria">Digite o nome da categoria</label>
                <br>
                <input id="nomeCategoria" type="text">
                <br>
                <label for="limiteCategoria">Se houver, digite a meta de valor limite da categoria</label>
                <br>
                <input id="limiteCategoria" type="number">
                <br>
                <button onclick="btnAddCategoria()">Salvar</button>
            </div>

            <section id="exibirCategorias">
                <table>
                    <thead>
                        <tr>
                            <th>Categoria</th>
                            <th>Meta de limite de gasto</th>
                        </tr>
                    </thead>
                
                    <tbody id="tabelaCategorias">
                    
                    </tbody>
                </table>
            </section>

             <button id="btnSairCategorias" onclick="abrirFecharCardsFlut('cardFlutCategorias')">
                    Sair
                </button>
        </section>
        <!-- Fim Card flutuante categorias -->

        <!-- Exibindos transacoes -->
        <section class="transacoes">
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Valor</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
            
                <tbody id="tabelaTransacoes">
                
                </tbody>
            </table>
        </section>
    </main>

    <footer>

    </footer>

    <script src="js/script.js"></script>
</body>
</html>
